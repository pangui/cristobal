services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: cristobal-devcontainer:latest
    hostname: cristobal
    volumes:
      - ~/cristobal:/home/cristobal/cristobal:cached
      - ~/.ssh/secrets:/home/cristobal/.ssh/secrets:ro
      - cristobal_claude_state:/home/cristobal/.claude-state
      - /var/run/docker.sock:/var/run/docker.sock
    command: ["sleep", "infinity"]

volumes:
  cristobal_claude_state:
