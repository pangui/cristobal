services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: cristobal-devcontainer:latest
    hostname: cristobal
    environment:
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY-}"
    volumes:
      - ~/repos/cristobal:/home/cristobal/repos/cristobal:cached
      - ~/.ssh/secrets:/home/cristobal/.ssh/secrets:ro
      - cristobal_claude_state:/home/cristobal/.claude-state
    command: ["sleep", "infinity"]

volumes:
  cristobal_claude_state:
